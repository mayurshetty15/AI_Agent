{% extends "base.html" %}

{% block content %}
<h1>Create New User</h1>

<form method="post">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" value="{{ name or '' }}" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" value="{{ email or '' }}" required>

    <label for="role">Role:</label>
    <select id="role" name="role" required>
        <option value="">Select Role</option>
        <option value="Admin" {% if role == 'Admin' %}selected{% endif %}>Admin</option>
        <option value="Developer" {% if role == 'Developer' %}selected{% endif %}>Developer</option>
        <option value="Designer" {% if role == 'Designer' %}selected{% endif %}>Designer</option>
        <option value="Manager" {% if role == 'Manager' %}selected{% endif %}>Manager</option>
        <option value="Viewer" {% if role == 'Viewer' %}selected{% endif %}>Viewer</option>
    </select>

    <label for="status">Status:</label>
    <select id="status" name="status" required>
        <option value="Active" {% if status == 'Active' %}selected{% endif %}>Active</option>
        <option value="Inactive" {% if status == 'Inactive' %}selected{% endif %}>Inactive</option>
    </select>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>

    <button type="submit" class="btn btn-primary">Create User</button>
    <a href="{{ url_for('users') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
