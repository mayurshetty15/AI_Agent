{% extends "base.html" %}

{% block content %}
<h1>License Management</h1>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Current License</th>
            <th>Assign New License</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td><span class="badge badge-license">{{ user.license }}</span></td>
            <td>
                <form method="post" action="{{ url_for('assign_license') }}" style="display:flex; align-items:center;">
                    <input type="hidden" name="user_id" value="{{ user.id }}">
                    <select name="license" required>
                        <option value="None" {% if user.license == 'None' %}selected{% endif %}>None</option>
                        <option value="Microsoft365" {% if user.license == 'Microsoft365' %}selected{% endif %}>Microsoft365</option>
                        <option value="GitHub" {% if user.license == 'GitHub' %}selected{% endif %}>GitHub</option>
                        <option value="Slack" {% if user.license == 'Slack' %}selected{% endif %}>Slack</option>
                        <option value="Jira" {% if user.license == 'Jira' %}selected{% endif %}>Jira</option>
                    </select>
                    <button type="submit" class="btn btn-primary" style="margin-left:10px;">Assign</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
